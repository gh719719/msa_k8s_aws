apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-deployment
  namespace: lgcns
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      containers:
        - name: order-container
          image: 414901227428.dkr.ecr.ap-northeast-2.amazonaws.com/order-service:latest
          ports:
          - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: "500Mi"
            requests:
              cpu: "0.5"
              memory: "500Mi"
          env:
            - name: SPRING_CLOUD_CONFIG_ENABLED
              value: "false"
            # 🚀 스프링이 인식하는 정확한 환경변수 명칭으로 주입
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mariadb://lgcns-gh719719.c3ca4koq6a36.ap-northeast-2.amazonaws.com:3306/product" # 'product'는 본인의 DB 스키마 이름으로 수정하세요
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: lgcns-app-secrets
                  key: DB_ADMIN
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lgcns-app-secrets
                  key: DB_PASSWORD
                  
          # # 컨테이너 상태 확인
          # readinessProbe:
          #   httpGet:
          #     path: /health
          #     port: 8080

      imagePullSecrets:
      - name: ecr-secret

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: lgcns
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: order