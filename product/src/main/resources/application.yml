# msa - k8s - aws version
# eks 배포 시 apigateway는 eureka server 등록하지 않겠다.
eureka:
  client:
    enabled: false
    
spring:  
  application:
    name: product-service

  datasource:
    driver-class-name:  org.mariadb.jdbc.Driver
    url:                jdbc:mariadb://localhost:3306/inspire   # 마지막은 DB 이름
    username:           inspire
    password:           '$pp020719'

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate: 
        ddl-auto: create
    show-sql: true

  kafka:
    # pod 실행 중인 service 이름으로 변경 (localhost X)
    kafka-server: kafka-service:9092
    consumer:
      group-id: product-group
      auto-offset-reset: earliest