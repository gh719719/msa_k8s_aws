
name: deploy order

on:
  push:
    branches:
      - main  # github의 main branch에 push하면 workflow의 액션 감지 -> 파이프라인 동작

jobs:
  
  # job-name
  build-and-deploy:

    # runner
    runs-on: ubuntu-latest

    steps:
      - name: checkout github
        uses: actions/checkout@v2

      - name: install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.34.1"

      # aws 인증
      - name: aws configure
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ap-northeast-2

      - name: aws eks cluster update
        run: aws eks update-kubeconfig --region ap-northeast-2 --name lgcns-gh719719-cluster

      - name: aws ecr login
        uses: aws-actions/amazon-ecr-login@v1

      - name: create namespace
        run: |
          kubectl create namespace lgcns --dry-run=client -o yaml | kubectl apply -f -

      # infra 구축(ingress, kafka, redis, zookepper, rabbitMQ)
      - name: deploy infra
        run: |
          kubectl apply -f ./k8s/msa-ingress.yml
          kubectl apply -f ./k8s/msa-zookeeper.yml
          kubectl apply -f ./k8s/msa-kafka.yml
          kubectl apply -f ./k8s/msa-redis.yml

      # image 생성하고 ecr push까지 자동화
      # apigateway, user, product, order
      - name: image build and push docker image to ecr
        env: 
          REGISTRY: 414901227428.dkr.ecr.ap-northeast-2.amazonaws.com
          REPOSITORY: apigateway
          IMAGE_TAG: latest
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -f ./apigateway/Dockerfile . ./apigateway
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: eks kubectl apigateway apply
        run: |
          kubectl apply -f ./apigateway/k8s/apigateway-depl.yml
          kubectl rollout restart deployment apigateway-deployment -n lgcns
