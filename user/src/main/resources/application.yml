# msa - k8s - aws version
eureka:
  client:
    enabled: false

spring:
  application:
    name: user-service

  datasource:
    driver-class-name:  org.mariadb.jdbc.Driver
    url:                jdbc:mariadb://localhost:3306/inspire   # 마지막은 DB 이름
    username:           inspire
    password:           '$pp020719'

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate: 
        ddl-auto: create
    show-sql: true

jwt:
  secret: jwt-secret-key-gh719719-1234567890