apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-deployment
  namespace: lgcns
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
        - name: user-container
          image: 414901227428.dkr.ecr.ap-northeast-2.amazonaws.com/user-gh719719-backend:v2
          ports:
          - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: "500Mi"
            requests:
              cpu: "0.5"
              memory: "500Mi"
          env:
            # 🚀 Config 서버 체크를 끄기 위해 추가한 부분
            - name: SPRING_CLOUD_CONFIG_ENABLED
              value: "false"
            # RDS 연결 정보
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: lgcns-app-secrets
                  key: DB_HOST
            - name: DB_ADMIN
              valueFrom:
                secretKeyRef:
                  name: lgcns-app-secrets
                  key: DB_ADMIN
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lgcns-app-secrets
                  key: DB_PASSWORD
      imagePullSecrets:
      - name: ecr-secret

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: lgcns
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: user