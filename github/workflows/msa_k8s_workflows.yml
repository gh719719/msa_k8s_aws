
name: deploy order

on:
  push:
    branches:
      - main  # github의 main branch에 push하면 workflow의 액션 감지 -> 파이프라인 동작

jobs:
  
  # job-name
  build-and-deploy:

    # runner
    runs-on: ubuntu-latest

    steps:
      - name: checkout github
        uses: actions/checkout@v2

      - name: install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.34.1"

      - name: aws configure
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ap-northeast-2

      - name: aws eks cluster update
        run: aws eks update-kubeconfig --region ap-northeast-2 --name lgcns-gh719719-cluster

      - name: aws ecr login
        uses: aws-actions/amazon-ecr-login@v1

      - name: image build and push docker image to ecr
        env: 
          REGISTRY: 414901227428.dkr.ecr.ap-northeast-2.amazonaws.com
          REPOSITORY: order-gh719719-backend
          IMAGE_TAG: latest
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -f Dockerfile .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

      - name: kubectrl apply
        run: |
          kubectl apply -f k8s/order_redis.yml
          kubectl apply -f k8s/order_deployment.yml
          kubectl apply -f k8s/order_ingress.yml
          kubectl rollout restart deployment order-deployment -n lgcns